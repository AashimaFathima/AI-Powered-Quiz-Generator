<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>AI-Powered Quiz Generator</title>

  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
  >
</head>

<body>

  <div class="container">

    <!-- Title -->
    <h1 class="page-title">
      AI-Powered Quiz Generator
    </h1>

    <!-- ==========================
         INPUT SECTION
    =========================== -->

    <div class="input-section">

      <!-- Tabs -->

      <div class="tab-buttons">

        <button
          class="tab-btn active"
          onclick="switchTab('text')">

          Text Input

        </button>

        <button
          class="tab-btn"
          onclick="switchTab('pdf')">

          PDF Upload

        </button>

      </div>

      <!-- Text Input -->

      <div
        id="text-tab"
        class="tab-content active">

        <textarea
          id="text-input"
          placeholder="Paste your text here...">
        </textarea>

      </div>

      <!-- PDF Input -->

      <div
        id="pdf-tab"
        class="tab-content">

        <input
          type="file"
          id="pdf-input"
          accept=".pdf">

      </div>

      <!-- Question Numbers -->

      <div class="question-numbers">

        <div class="input-group">
          <label>MCQs:</label>
          <input
            type="number"
            id="mcqs"
            min="0"
            value="2">
        </div>

        <div class="input-group">
          <label>FIBs:</label>
          <input
            type="number"
            id="fibs"
            min="0"
            value="2">
        </div>

        <div class="input-group">
          <label>T/F:</label>
          <input
            type="number"
            id="tfs"
            min="0"
            value="2">
        </div>

      </div>

      <!-- Generate Button -->

      <button class="generate-btn">
        Generate Questions
      </button>

    </div>

    <!-- ==========================
         QUIZ SECTION
    =========================== -->

    <div
      id="quiz-section"
      class="hidden">

      <div id="questions-container">

      </div>

    </div>

    <!-- ==========================
         SCORE
    =========================== -->

    <div
      id="score"
      class="score-box hidden">

    </div>

    <!-- ==========================
         ACTION BUTTONS
    =========================== -->

    <div class="action-buttons">

      <button
        id="show-results-btn"
        class="hidden">

        Show Results

      </button>

      <button
        id="download-results-btn"
        class="hidden">

        Download Results

      </button>

    </div>

    <!-- ==========================
         RESULTS
    =========================== -->

    <div id="results-container">

    </div>

    <!-- ==========================
         ERROR DISPLAY
    =========================== -->

    <div
      id="error"
      class="error-box hidden">

    </div>

  </div>

  <!-- Javascript -->

  <script
    src="{{ url_for('static', filename='script.js') }}">
  </script>

</body>
</html>
